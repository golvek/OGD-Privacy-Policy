<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    background: #1e1e1e;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    font-size: 14px;
  }
  .tasks-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .task-field {
    flex: 1;
  }
  .task-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-align: center;
  }
  .ads-label { color: #64ffda; }
  .halo-label { color: #81c784; }
  .task-field input {
    width: 100%;
    background: #2a2a2a;
    border: 2px solid transparent;
    appearance: textfield;
    -moz-appearance: textfield;
    -webkit-appearance: none;
    border-radius: 8px;
    padding: 12px 8px;
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
    text-align: center;
    outline: none;
  }
  .ads-input { color: #64ffda; }
  .ads-input:focus { border-color: rgba(100,255,218,0.4); }
  .halo-input { color: #81c784; }
  .halo-input:focus { border-color: rgba(129,199,132,0.4); }
  .task-field input::-webkit-inner-spin-button,
  .task-field input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .row label { font-size: 12px; color: rgba(255,255,255,0.4); }
  .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3a3a3a; border-radius: 20px; transition: .15s; }
  .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #fff; border-radius: 50%; transition: .15s; }
  input:checked + .toggle-slider { background-color: #b19cd9; }
  input:checked + .toggle-slider:before { transform: translateX(16px); }
  .timer-row input {
    width: 54px;
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    color: #b19cd9;
    padding: 4px 6px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    font-family: inherit;
    appearance: textfield;
    -moz-appearance: textfield;
    -webkit-appearance: none;
    outline: none;
  }
  .timer-row input:focus { border-color: rgba(177,156,217,0.4); }
  .timer-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .btn-history {
    width: 100%;
    margin-bottom: 12px;
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: rgba(255,255,255,0.35);
    padding: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: .15s;
    letter-spacing: 0.5px;
  }
  .btn-history:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.18); }
</style>
</head>
<body>
  <div class="tasks-row">
    <div class="task-field">
      <label class="ads-label">ADS</label>
      <input id="ads-input" type="number" min="0" step="1" class="ads-input">
    </div>
    <div class="task-field">
      <label class="halo-label">HALO</label>
      <input id="halo-input" type="number" min="0" step="1" class="halo-input">
    </div>
  </div>

  <button id="history-btn" class="btn-history">History</button>

  <div class="row">
    <label>Reset daily</label>
    <label class="toggle-switch">
      <input type="checkbox" id="daily-reset-toggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="row timer-row" style="margin-bottom:12px">
    <label>Reset at hour (0-23)</label>
    <input id="reset-hour-input" type="number" min="0" max="23" step="1" value="0">
  </div>

  <div class="row timer-row">
    <label>Timer (seconds)</label>
    <input id="timer-input" type="number" min="5" step="1" value="90">
  </div>

  <a id="donate-link" href="https://ko-fi.com/golvek#checkoutModal" target="_blank" style="display:block;text-align:center;margin-top:14px;">
    <img style="border:0;height:36px;" src="https://storage.ko-fi.com/cdn/kofi4.png?v=6" alt="Support me on Ko-fi">
  </a>
  <script src="popup.js"></script>
</body>
</html>
