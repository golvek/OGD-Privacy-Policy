<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>History - Ogden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e1e;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 32px;
    max-width: 800px;
    margin: 0 auto;
    font-size: 14px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .subtitle { color: rgba(255,255,255,0.3); font-size: 13px; margin-bottom: 24px; }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
    margin-top: 32px;
  }
  .today-box {
    background: #252525;
    border-radius: 8px;
    padding: 20px;
  }
  .today-cols {
    display: flex;
    gap: 0;
  }
  .today-col {
    flex: 1;
    text-align: center;
  }
  .today-col-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .halo-header { color: #81c784; }
  .ads-header { color: #64ffda; }
  .today-col-value {
    font-size: 32px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }
  .today-col-sub {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.5);
  }
  .halo-value { color: #81c784; }
  .ads-value { color: #64ffda; }
  .today-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 14px 0 10px;
  }
  .today-total {
    display: flex;
    justify-content: center;
    gap: 8px;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    font-weight: 600;
  }
  .today-total .label { color: rgba(255,255,255,0.3); font-weight: 400; }
  .empty-today {
    text-align: center;
    color: rgba(255,255,255,0.15);
    padding: 20px 0;
    font-size: 13px;
  }
  .past-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .btn-expand {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.5);
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-expand:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .nav-arrow {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.5);
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .nav-arrow:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.25); }
  .nav-arrow:disabled { opacity: 0.2; cursor: default; }
  .nav-range {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .collapsed { display: none; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  th.halo { color: #81c784; }
  th.ads { color: #64ffda; }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-variant-numeric: tabular-nums;
    font-size: 14px;
  }
  td.date { color: rgba(255,255,255,0.7); }
  td.halo { color: #81c784; }
  td.ads { color: #64ffda; }
  .empty {
    text-align: center;
    color: rgba(255,255,255,0.2);
    padding: 32px 0;
  }
  .totals-row td {
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: none;
  }
</style>
</head>
<body>

<h1>History</h1>
<p class="subtitle" id="subtitle">Loading...</p>

<div class="section-label">Today</div>
<div id="today-box"></div>

<div class="section-label">Past days</div>
<p style="font-size:11px;color:rgba(255,255,255,0.15);margin-top:-8px;margin-bottom:12px">Click expand to open the last 7 days</p>
<div class="past-header-row">
  <span style="font-size:11px;color:rgba(255,255,255,0.2)">7-day view</span>
  <button id="btn-expand" class="btn-expand">Expand</button>
</div>
<div class="nav-row" id="nav-row" style="display:none">
  <button id="btn-prev" class="nav-arrow">&lt;</button>
  <span class="nav-range" id="nav-range"></span>
  <button id="btn-next" class="nav-arrow">&gt;</button>
</div>
<div id="past-table-container" style="display:none">
  <div id="month-label" style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.45);margin-bottom:8px;text-align:center;line-height:1"></div>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th class="ads">ADS tasks</th>
        <th class="ads">ADS time</th>
        <th class="halo">HALO tasks</th>
        <th class="halo">HALO time</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="history.js"></script>

</body>
</html>
